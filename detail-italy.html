<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Italy — F1 Circuit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;700&display=swap');
@font-face{font-family:'Futura';src:local('Futura'),local('Futura-Medium');}

:root{
  --red:#E10600;
  --fen:'Futura','Trebuchet MS',Arial,sans-serif;
  --fkr:'IBM Plex Sans KR','Apple SD Gothic Neo',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--fen);}

.layout{display:flex;width:100vw;height:100vh;}

/* ─── 왼쪽: 검정 배경 + 서킷 ─── */
.left{
  position:relative;
  width:64%;height:100%;
  background:#000;overflow:hidden;
  animation:inL .7s cubic-bezier(.16,1,.3,1) both;
}
/* 국기 배경 — 은은하게 */
.left-flag{
  position:absolute;inset:0;
  background:url('Gonfalon/Italy.png') center/cover no-repeat;
  opacity:.07;
}
/* 뒤로가기 삼각형 */
.back{
  position:absolute;top:38px;left:42px;
  width:50px;height:50px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:10;
  transition:transform .2s;
}
.back:hover{transform:translateX(-5px);}
.back svg{width:34px;height:34px;fill:#fff;}
/* 국가 제목 */
.title{
  position:absolute;top:30px;left:50%;
  transform:translateX(-50%);
  font-family:var(--fen);font-size:54px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;color:#fff;
  z-index:5;white-space:nowrap;
}
/* 서킷 이미지 */
.circuit{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-46%);
  width:80%;max-height:68%;
  object-fit:contain;
  filter:drop-shadow(0 0 60px rgba(225,6,0,.3));
  animation:float 5s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translate(-50%,-46%) translateY(0);}
  50%    {transform:translate(-50%,-46%) translateY(-14px);}
}

/* ─── 오른쪽: 흰 배경 + 스펙 ─── */
.right{
  width:36%;height:100%;
  background:#fff;
  display:flex;flex-direction:column;justify-content:center;
  padding:60px 56px;
  animation:inR .7s cubic-bezier(.16,1,.3,1) .1s both;
}
.spec{
  padding:26px 0;

}

.spec-l{
  font-family:var(--fen);font-size:22px;font-weight:700;
  color:var(--red);margin-bottom:6px;
}
.spec-v{
  font-family:var(--fen);font-size:32px;font-weight:400;color:#000;
}

@keyframes inL{from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
@keyframes inR{from{opacity:0;transform:translateX(40px);} to{opacity:1;transform:translateX(0);}}
</style>
</head>
<body>
<div class="layout">

  <!-- 왼쪽 -->
  <div class="left">
    <div class="left-flag"></div>
    <!-- 뒤로가기: 이전 페이지(메인)로 -->
    <div class="back" onclick="history.back()" title="뒤로가기">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><polygon points="18,3 6,12 18,21"/></svg>
    </div>
    <div class="title">Italy</div>
    <img class="circuit" src="Circuts/Circut 16 i.png" alt="Italy Circuit"/>
  </div>

  <!-- 오른쪽 -->
  <div class="right">
    <div class="spec">
      <div class="spec-l">Circuit Length</div>
      <div class="spec-v">5.793 km</div>
    </div>
    <div class="spec">
      <div class="spec-l">First Grand Prix</div>
      <div class="spec-v">1950</div>
    </div>
    <div class="spec">
      <div class="spec-l">Number of Laps</div>
      <div class="spec-v">53</div>
    </div>
    <div class="spec">
      <div class="spec-l">Fastest lap time</div>
      <div class="spec-v">1:20.901</div>
    </div>
    <div class="spec">
      <div class="spec-l">Race Distance</div>
      <div class="spec-v">306.72 km</div>
    </div>
  </div>

</div>
</body>
</html>
